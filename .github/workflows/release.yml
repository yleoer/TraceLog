name: Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  NODE_OPTIONS: --max-old-space-size=4096
  NODE_VERSION: "24"
  WAILS_VERSION: v2.10.2

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: windows-amd64
            os: windows-latest
            platform: windows/amd64
            wails_args: -nsis -webview2 embed
            package: nsis
          - artifact: linux-amd64
            os: ubuntu-22.04
            platform: linux/amd64
            wails_args: ""
            package: deb
          - artifact: macos-universal
            os: macos-latest
            platform: darwin/universal
            wails_args: ""
            package: dmg
    env:
      RELEASE_LABEL: ${{ github.ref_type == 'tag' && github.ref_name || format('run-{0}', github.run_number) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            dpkg-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Test Go packages
        run: go test ./...

      - name: Build Wails package
        shell: bash
        run: |
          wails build -clean -trimpath -platform "${{ matrix.platform }}" ${{ matrix.wails_args }}

      - name: Package Windows artifact
        if: matrix.package == 'nsis' && runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          $installer = Get-ChildItem -Path build/bin -Filter "*installer.exe" -File | Select-Object -First 1
          if (-not $installer) {
            Get-ChildItem -Path build/bin -Recurse | Format-Table FullName, Length
            throw "NSIS installer was not produced."
          }
          Copy-Item -LiteralPath $installer.FullName -Destination "release/TraceLog-$env:RELEASE_LABEL-${{ matrix.artifact }}-installer.exe" -Force

      - name: Package macOS artifact
        if: matrix.package == 'dmg' && runner.os == 'macOS'
        run: |
          app_path="$(find build/bin -maxdepth 1 -name "*.app" -print -quit)"
          if [ -z "$app_path" ]; then
            find build/bin -maxdepth 2 -print
            echo "No macOS .app bundle was produced." >&2
            exit 1
          fi
          rm -rf release/dmg-root
          mkdir -p release/dmg-root release
          ditto "$app_path" "release/dmg-root/$(basename "$app_path")"
          ln -s /Applications "release/dmg-root/Applications"
          hdiutil create \
            -volname "TraceLog" \
            -srcfolder release/dmg-root \
            -ov \
            -format UDZO \
            "release/TraceLog-${RELEASE_LABEL}-${{ matrix.artifact }}.dmg"
          rm -rf release/dmg-root

      - name: Package Linux artifact
        if: matrix.package == 'deb'
        run: |
          binary_path="$(find build/bin -maxdepth 1 -type f -name "TraceLog*" -perm -111 -print -quit)"
          if [ -z "$binary_path" ]; then
            find build/bin -maxdepth 2 -print
            echo "No Linux executable was produced." >&2
            exit 1
          fi
          deb_version="${RELEASE_LABEL#v}"
          if ! printf '%s' "$deb_version" | grep -Eq '^[0-9]'; then
            safe_label="$(printf '%s' "$RELEASE_LABEL" | sed -E 's/[^A-Za-z0-9.+~]/./g')"
            deb_version="0.0.0+${safe_label}"
          fi
          pkgroot="release/deb-root"
          rm -rf "$pkgroot"
          mkdir -p release
          install -Dm755 "$binary_path" "$pkgroot/usr/bin/tracelog"
          install -Dm644 build/appicon.png "$pkgroot/usr/share/pixmaps/tracelog.png"
          mkdir -p "$pkgroot/usr/share/applications"
          printf '%s\n' \
            '[Desktop Entry]' \
            'Type=Application' \
            'Name=TraceLog' \
            'Comment=Personal Jira work log desktop app' \
            'Exec=/usr/bin/tracelog' \
            'Icon=tracelog' \
            'Terminal=false' \
            'Categories=Office;ProjectManagement;' \
            > "$pkgroot/usr/share/applications/tracelog.desktop"
          chmod 644 "$pkgroot/usr/share/applications/tracelog.desktop"
          mkdir -p "$pkgroot/DEBIAN"
          printf '%s\n' \
            'Package: tracelog' \
            "Version: ${deb_version}" \
            'Section: utils' \
            'Priority: optional' \
            'Architecture: amd64' \
            'Maintainer: yleoer <yleoer@foxmail.com>' \
            'Depends: libgtk-3-0, libwebkit2gtk-4.0-37' \
            'Description: TraceLog desktop work log application' \
            ' TraceLog records Jira issue analysis, temporary tasks, daily work and weekly reports.' \
            > "$pkgroot/DEBIAN/control"
          dpkg-deb --build --root-owner-group "$pkgroot" "release/TraceLog-${RELEASE_LABEL}-${{ matrix.artifact }}.deb"
          rm -rf "$pkgroot"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: TraceLog-${{ env.RELEASE_LABEL }}-${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "TraceLog release $TAG_NAME"
          gh release upload "$TAG_NAME" release-assets/* --clobber
