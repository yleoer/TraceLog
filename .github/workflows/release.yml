name: Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  NODE_OPTIONS: --max-old-space-size=4096
  NODE_VERSION: "24"
  WAILS_VERSION: v2.10.2

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: windows-amd64
            os: windows-latest
            platform: windows/amd64
            wails_args: -nsis -webview2 embed
            archive: zip
          - artifact: linux-amd64
            os: ubuntu-22.04
            platform: linux/amd64
            wails_args: ""
            archive: tar.gz
          - artifact: darwin-universal
            os: macos-latest
            platform: darwin/universal
            wails_args: ""
            archive: zip
    env:
      RELEASE_LABEL: ${{ github.ref_type == 'tag' && github.ref_name || format('run-{0}', github.run_number) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Test Go packages
        run: go test ./...

      - name: Build Wails package
        shell: bash
        run: |
          wails build -clean -trimpath -platform "${{ matrix.platform }}" ${{ matrix.wails_args }}

      - name: Package Windows artifact
        if: matrix.archive == 'zip' && runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path build/bin/* -DestinationPath "release/TraceLog-$env:RELEASE_LABEL-${{ matrix.artifact }}.zip" -Force

      - name: Package macOS artifact
        if: matrix.archive == 'zip' && runner.os == 'macOS'
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc build/bin "release/TraceLog-${RELEASE_LABEL}-${{ matrix.artifact }}.zip"

      - name: Package Linux artifact
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p release
          tar -czf "release/TraceLog-${RELEASE_LABEL}-${{ matrix.artifact }}.tar.gz" -C build/bin .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: TraceLog-${{ env.RELEASE_LABEL }}-${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "TraceLog release $TAG_NAME"
          gh release upload "$TAG_NAME" release-assets/* --clobber
